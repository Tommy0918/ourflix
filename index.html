<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ourflix - 我們的未完待續</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #141414;
            color: #fff;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        /* ==================== 1. 選擇使用者介面 ==================== */
        .profile-gate {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #141414;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        .profile-title {
            font-size: 2.5rem;
            color: #fff;
            margin-bottom: 40px;
            font-weight: 500;
            letter-spacing: 2px;
        }

        @media (max-width: 768px) {
            .profile-title { font-size: 1.8rem; }
            .profile-list { gap: 20px !important; }
            .avatar-box { width: 110px !important; height: 110px !important; }
            .profile-name { font-size: 1rem !important; }
        }

        .profile-list {
            display: flex;
            gap: 40px;
            list-style: none;
        }

        .profile-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            text-decoration: none;
        }

        .avatar-box {
            position: relative;
            width: 140px;
            height: 140px;
            border-radius: 4px;
            overflow: hidden;
            border: 4px solid transparent;
            transition: border-color 0.2s ease, transform 0.2s ease;
            background-size: cover;
            background-position: center;
        }

        /* 這裡會自動套用你剛剛設定好的美麗圖片 */
        .avatar-her { background-image: url('https://picsum.photos/150/150?girl'); }
        .avatar-him { background-image: url('https://picsum.photos/150/150?boy'); }

        .profile-item:hover .avatar-box {
            border-color: #fff;
            transform: scale(1.05);
        }

        .profile-name {
            margin-top: 15px;
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.6);
            transition: color 0.2s ease;
        }

        .profile-item:hover .profile-name {
            color: #fff;
        }

        /* ==================== 2. Netflix 經典片頭動畫 ==================== */
        .intro-animation {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 999;
            justify-content: center;
            align-items: center;
        }

        .netflix-logo-n {
            font-size: 12rem;
            color: #E50914;
            font-weight: 900;
            font-family: 'Arial Black', Impact, sans-serif;
            transform: scale(0.5);
            opacity: 0;
        }

        @keyframes tudumEffect {
            0% { transform: scale(0.6); opacity: 0; filter: blur(5px); }
            20% { transform: scale(1); opacity: 1; filter: blur(0px); text-shadow: 0 0 20px rgba(229, 9, 20, 0.6); }
            70% { transform: scale(1.1); opacity: 1; filter: blur(0px); }
            100% { transform: scale(4); opacity: 0; filter: blur(10px); }
        }

        .animate-n {
            animation: tudumEffect 3.5s forwards ease-in-out;
        }

        /* ==================== 3. 主頁面樣式 ==================== */
        .main-content {
            opacity: 0;
            transition: opacity 1s ease;
        }

        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 4%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);
            z-index: 10;
            display: flex;
            align-items: center;
        }

        .logo {
            color: #E50914;
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-decoration: none;
        }

        .banner {
            position: relative;
            height: 100vh;
            background: linear-gradient(to right, rgba(0,0,0,0.85) 40%, rgba(0,0,0,0.2) 100%), 
                        url('https://picsum.photos/1920/1080?romantic') no-repeat center center/cover;
            display: flex;
            align-items: center;
            padding: 0 4%;
        }

        .banner-content {
            max-width: 650px;
            z-index: 2;
            margin-top: 50px;
        }

        .banner-title {
            font-size: 3.2rem;
            font-weight: bold;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            .banner-title { font-size: 2.2rem; }
            .banner-desc { font-size: 1rem !important; }
        }

        .banner-info {
            margin-bottom: 20px;
            font-size: 1rem;
            color: #cccccc;
        }

        .match-score {
            color: #46d369;
            font-weight: bold;
            margin-right: 15px;
        }

        .badge {
            border: 1px solid rgba(255,255,255,0.4);
            padding: 1px 6px;
            font-size: 0.75rem;
            margin-left: 8px;
            border-radius: 2px;
        }

        .banner-desc {
            font-size: 1.15rem;
            line-height: 1.6;
            margin-bottom: 35px;
            color: #e5e5e5;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            padding: 12px 26px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 12px;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .btn-play { background-color: #fff; color: #000; }
        .btn-play:hover { background-color: rgba(255, 255, 255, 0.75); }
        .btn-info { background-color: rgba(109, 109, 110, 0.7); color: #fff; }
        .btn-info:hover { background-color: rgba(109, 109, 110, 0.4); }

        .video-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 100;
            justify-content: center; align-items: center;
        }

        .modal-content {
            position: relative;
            width: 85%; max-width: 950px; aspect-ratio: 16/9;
            background-color: #181818; border-radius: 8px; overflow: hidden;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .close-btn { position: absolute; top: 15px; right: 20px; color: white; font-size: 35px; cursor: pointer; z-index: 101; transition: color 0.2s;}
        .close-btn:hover { color: #E50914; }
        .video-container { width: 100%; height: 100%; }
        .video-container iframe, .video-container video { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <!-- 1. 選擇使用者介面 -->
    <div class="profile-gate" id="profileGate">
        <h1 class="profile-title">今天，想看哪一段故事？</h1>
        <ul class="profile-list">
            <li class="profile-item" onclick="selectUser('寶貝')">
                <div class="avatar-box avatar-her"></div>
                <div class="profile-name">執子之手</div>
            </li>
            <li class="profile-item" onclick="selectUser('男友')">
                <div class="avatar-box avatar-him"></div>
                <div class="profile-name">與子偕老</div>
            </li>
        </ul>
    </div>

    <!-- 2. Netflix 經典片頭動畫區塊 -->
    <div class="intro-animation" id="introAnimation">
        <div class="netflix-logo-n" id="netflixN">N</div>
    </div>

    <!-- 3. 主頁面內容 -->
    <div class="main-content" id="mainContent">
        <nav class="navbar">
            <a href="#" class="logo">OURFLIX</a>
        </nav>

        <header class="banner">
            <div class="banner-content">
                <h1 class="banner-title">致，不完美的我們</h1>
                
                <div class="banner-info">
                    <span class="match-score">100% 命定珍藏</span>
                    <span>2026</span>
                    <span class="badge">全系列完結篇？</span>
                    <span class="badge" style="color: #ffc107; border-color: #ffc107;">精彩未完待續</span>
                </div>
                
                <p class="banner-desc">
                    我知道，我從來就不是一個完美的人。在遇見妳之前，我甚至不太確定自己是不是真的懂得如何去愛一個人、如何體貼、如何給予毫無保留的溫暖。
                    <br><br>
                    謝謝妳，用妳的包容與溫柔，教會了我什麼是愛，也讓我看見了自己的不足。如果可以，妳願意再給未來的我，一次繼續牽著妳寫下新篇章的機會嗎？
                </p>
                
                <div>
                    <button class="btn btn-play" onclick="openModal()">▶ 播放回憶錄</button>
                    <button class="btn btn-info" onclick="showLoveMessage()">ⓘ 關於未來</button>
                </div>
            </div>
        </header>
    </div>

    <!-- 影片彈出燈箱 -->
    <div class="video-modal" id="videoModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div class="video-container">
                <iframe id="videoPlayer" src="https://www.youtube.com/embed/dQw4w9WgXcQ?enablejsapi=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script>
        // 加入 try-catch 防呆，避免音效被瀏覽器封鎖時導致整個點擊功能掛掉
        function playTudumSound() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                
                const ctx = new AudioContext();
                
                setTimeout(() => {
                    createTone(ctx, 90, 0.1, 0.4); 
                    createTone(ctx, 130, 0.1, 0.3); 
                }, 0);

                setTimeout(() => {
                    createTone(ctx, 80, 0.15, 0.8); 
                    createTone(ctx, 110, 0.15, 0.6); 
                    createTone(ctx, 55, 0.2, 0.9); 
                }, 150);
            } catch (e) {
                console.log("音效遭瀏覽器封鎖，已自動忽略並繼續播放動畫：", e);
            }
        }

        function createTone(ctx, freq, attack, volume) {
            try {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sawtooth'; 
                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                
                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(300, ctx.currentTime);

                gain.gain.setValueAtTime(0, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(volume, ctx.currentTime + attack);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.2);

                osc.connect(filter);
                filter.connect(gain);
                gain.connect(ctx.destination);
                
                osc.start();
                osc.stop(ctx.currentTime + 1.2);
            } catch(err) {}
        }

        // 流程控制：確保不論如何，畫面一定會動
        function selectUser(userName) {
            // 立即執行淡出
            document.getElementById('profileGate').style.opacity = '0';
            
            setTimeout(() => {
                document.getElementById('profileGate').style.display = 'none';
                
                const intro = document.getElementById('introAnimation');
                const netflixN = document.getElementById('netflixN');
                
                intro.style.display = 'flex';
                netflixN.classList.add('animate-n');
                
                // 嘗試播放音效
                playTudumSound();
                
                // 3.2 秒後淡出片頭
                setTimeout(() => {
                    intro.style.opacity = '0';
                    setTimeout(() => {
                        intro.style.display = 'none';
                        const main = document.getElementById('mainContent');
                        main.style.opacity = '1';
                        document.body.style.overflow = 'auto'; 
                    }, 500);
                }, 3200);

            }, 500);
        }

        // 影片燈箱控制
        const modal = document.getElementById('videoModal');
        const player = document.getElementById('videoPlayer');

        function openModal() {
            modal.style.display = 'flex';
        }

        function closeModal() {
            modal.style.display = 'none';
            if (player.tagName === 'IFRAME') {
                const currentSrc = player.src;
                player.src = currentSrc; 
            } else if (player.tagName === 'VIDEO') {
                player.pause();
            }
        }

        function showLoveMessage() {
            alert("「對我來說，這部影集的最佳女主角永遠只有妳。不管劇情怎麼發展，我都希望能一直陪妳連載下去。」");
        }

        window.onclick = function(event) {
            if (event.target == modal) { closeModal(); }
        }
    </script>
</body>
</html>
