<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ourflix - 專屬我們的回憶</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #141414;
            color: #fff;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow: hidden; /* 初始鎖定滾動 */
        }

        /* ==================== 1. 選擇使用者介面 ==================== */
        .profile-gate {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #141414;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        .profile-title {
            font-size: 3.5rem;
            color: #fff;
            margin-bottom: 40px;
            font-weight: 500;
            letter-spacing: 2px;
        }

        .profile-list {
            display: flex;
            gap: 40px;
            list-style: none;
        }

        .profile-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            text-decoration: none;
        }

        .avatar-box {
            position: relative;
            width: 150px;
            height: 150px;
            border-radius: 4px;
            overflow: hidden;
            border: 4px solid transparent;
            transition: border-color 0.2s ease, transform 0.2s ease;
            background-size: cover;
            background-position: center;
        }

        /* 這裡可以換成你們自己的大頭貼網址 */
        .avatar-her { background-image: url('https://picsum.photos/150/150?girl'); }
        .avatar-him { background-image: url('https://picsum.photos/150/150?boy'); }

        .profile-item:hover .avatar-box {
            border-color: #fff;
            transform: scale(1.05);
        }

        .profile-name {
            margin-top: 20px;
            font-size: 1.3rem;
            color: rgba(255, 255, 255, 0.6);
            transition: color 0.2s ease;
        }

        .profile-item:hover .profile-name {
            color: #fff;
        }

        /* ==================== 2. Netflix 經典片頭動畫 ==================== */
        .intro-animation {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 999;
            justify-content: center;
            align-items: center;
        }

        .netflix-logo-n {
            font-size: 12rem;
            color: #E50914;
            font-weight: 900;
            font-family: 'Arial Black', Impact, sans-serif;
            transform: scale(0.5);
            opacity: 0;
        }

        /* 經典 N 字放大淡出動畫 */
        @keyframes tudumEffect {
            0% { transform: scale(0.6); opacity: 0; filter: blur(5px); }
            20% { transform: scale(1); opacity: 1; filter: blur(0px); text-shadow: 0 0 20px rgba(229, 9, 20, 0.6); }
            70% { transform: scale(1.1); opacity: 1; filter: blur(0px); }
            100% { transform: scale(4); opacity: 0; filter: blur(10px); }
        }

        .animate-n {
            animation: tudumEffect 3.5s forwards ease-in-out;
        }

        /* ==================== 3. 主頁面樣式 ==================== */
        .main-content {
            opacity: 0;
            transition: opacity 1s ease;
        }

        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 4%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 100%);
            z-index: 10;
            display: flex;
            align-items: center;
        }

        .logo {
            color: #E50914;
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-decoration: none;
        }

        .banner {
            position: relative;
            height: 85vh;
            background: linear-gradient(to right, rgba(0,0,0,0.8) 30%, rgba(0,0,0,0) 100%), 
                        url('https://picsum.photos/1920/1080?romantic') no-repeat center center/cover;
            display: flex;
            align-items: center;
            padding-left: 4%;
        }

        .banner-content { max-width: 600px; z-index: 2; }
        .banner-title { font-size: 3.5rem; font-weight: bold; margin-bottom: 20px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .banner-info { margin-bottom: 20px; font-size: 1.1rem; }
        .match-score { color: #46d369; font-weight: bold; margin-right: 15px; }
        .banner-desc { font-size: 1.2rem; line-height: 1.4; margin-bottom: 30px; text-shadow: 1px 1px 2px rgba(0,0,0,0.6); }

        .btn {
            display: inline-flex;
            align-items: center;
            padding: 12px 28px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 10px;
            transition: all 0.2s ease;
            text-decoration: none;
        }
        .btn-play { background-color: #fff; color: #000; }
        .btn-play:hover { background-color: rgba(255, 255, 255, 0.75); }
        .btn-info { background-color: rgba(109, 109, 110, 0.7); color: #fff; }
        .btn-info:hover { background-color: rgba(109, 109, 110, 0.4); }

        /* 影片燈箱彈出視窗 */
        .video-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 100;
            justify-content: center; align-items: center;
        }

        .modal-content {
            position: relative;
            width: 80%; max-width: 900px; aspect-ratio: 16/9;
            background-color: #181818; border-radius: 8px; overflow: hidden;
        }

        .close-btn { position: absolute; top: 15px; right: 20px; color: white; font-size: 30px; cursor: pointer; z-index: 101; }
        .video-container { width: 100%; height: 100%; }
        .video-container iframe, .video-container video { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <!-- 1. 選擇使用者介面 -->
    <div class="profile-gate" id="profileGate">
        <h1 class="profile-title">誰在觀看？</h1>
        <ul class="profile-list">
            <!-- 女朋友的頭像，點擊觸發動畫 -->
            <li class="profile-item" onclick="selectUser('寶貝')">
                <div class="avatar-box avatar-her"></div>
                <div class="profile-name">我的專屬寶貝</div>
            </li>
            <!-- 你的頭像 -->
            <li class="profile-item" onclick="selectUser('帥哥')">
                <div class="avatar-box avatar-him"></div>
                <div class="profile-name">最貼心的男友</div>
            </li>
        </ul>
    </div>

    <!-- 2. Netflix 經典片頭動畫區塊 -->
    <div class="intro-animation" id="introAnimation">
        <div class="netflix-logo-n" id="netflixN">N</div>
    </div>

    <!-- 3. 主頁面內容 -->
    <div class="main-content" id="mainContent">
        <nav class="navbar">
            <a href="#" class="logo">OURFLIX</a>
        </nav>

        <header class="banner">
            <div class="banner-content">
                <h1 class="banner-title" id="dynamicTitle">我們戀愛的無聊大小事</h1>
                
                <div class="banner-info">
                    <span class="match-score">100% 適合度</span>
                    <span>2026</span>
                    <span style="border: 1px solid rgba(255,255,255,0.4); padding: 0 4px; font-size: 0.8rem; margin-left: 10px;">18+ 閃光注意</span>
                </div>
                
                <p class="banner-desc">
                    這是一部記錄了兩個靈魂從相遇、相知到相守的浪漫巨作。
                    充滿了無數次大笑、偶爾的拌嘴、以及走過高山與大海的足跡。今天，就讓我們一起重溫這段不可思議的旅程。
                </p>
                
                <div>
                    <button class="btn btn-play" onclick="openModal()">▶ 播放</button>
                    <button class="btn btn-info" onclick="alert('我們預計還要再連載 100 年！')">ⓘ 更多資訊</button>
                </div>
            </div>
        </header>
    </div>

    <!-- 影片彈出燈箱 -->
    <div class="video-modal" id="videoModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div class="video-container">
                <!-- 填入你的回憶錄影片網址 -->
                <iframe id="videoPlayer" src="https://www.youtube.com/embed/dQw4w9WgXcQ?enablejsapi=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script>
        // 【音效設定】利用 Web Audio API 合成 Netflix 的經典「Tudum」雙低音爆發音效
        function playTudumSound() {
            if (typeof window.AudioContext !== 'undefined' || typeof window.webkitAudioContext !== 'undefined') {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const ctx = new AudioContext();
                
                // 第一聲低音 (Tu...)
                setTimeout(() => {
                    createTone(ctx, 90, 0.1, 0.4); 
                    createTone(ctx, 130, 0.1, 0.3); 
                }, 0);

                // 第二聲重低音，音量加大 (dum!!!)
                setTimeout(() => {
                    createTone(ctx, 80, 0.15, 0.8); 
                    createTone(ctx, 110, 0.15, 0.6); 
                    createTone(ctx, 55, 0.2, 0.9); // 極低音震撼感
                }, 150);
            }
        }

        function createTone(ctx, freq, attack, volume) {
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            
            osc.type = 'sawtooth'; // 鋸齒波比較有侵略感
            osc.frequency.setValueAtTime(freq, ctx.currentTime);
            
            // 低通濾波器，讓聲音沉悶像電影院
            const filter = ctx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(300, ctx.currentTime);

            gain.gain.setValueAtTime(0, ctx.currentTime);
            gain.gain.linearRampToValueAtTime(volume, ctx.currentTime + attack);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.2);

            osc.connect(filter);
            filter.connect(gain);
            gain.connect(ctx.destination);
            
            osc.start();
            osc.stop(ctx.currentTime + 1.2);
        }

        // ==================== 流程控制 ====================
        function selectUser(userName) {
            // 1. 隱藏選擇使用者頁面
            document.getElementById('profileGate').style.opacity = '0';
            
            setTimeout(() => {
                document.getElementById('profileGate').style.display = 'none';
                
                // 2. 顯示並啟動片頭動畫
                const intro = document.getElementById('introAnimation');
                const netflixN = document.getElementById('netflixN');
                intro.style.display = 'flex';
                netflixN.classList.add('animate-n');
                
                // 播放音效
                playTudumSound();
                
                // 3. 動播結束後滑入主頁面 (動畫長度約 3.5 秒)
                setTimeout(() => {
                    intro.style.opacity = '0';
                    setTimeout(() => {
                        intro.style.display = 'none';
                        // 顯示主頁
                        const main = document.getElementById('mainContent');
                        main.style.opacity = '1';
                        document.body.style.overflow = 'auto'; // 恢復滾動
                    }, 500);
                }, 3200);

            }, 500);
        }

        // ==================== 影片燈箱控制 ====================
        const modal = document.getElementById('videoModal');
        const player = document.getElementById('videoPlayer');

        function openModal() {
            modal.style.display = 'flex';
        }

        function closeModal() {
            modal.style.display = 'none';
            if (player.tagName === 'IFRAME') {
                const currentSrc = player.src;
                player.src = currentSrc; 
            } else if (player.tagName === 'VIDEO') {
                player.pause();
            }
        }

        window.onclick = function(event) {
            if (event.target == modal) { closeModal(); }
        }
    </script>
</body>
</html>
