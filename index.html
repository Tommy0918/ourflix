<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ourflix - 我們的未完待續</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #141414;
            color: #fff;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
        }

        /* ==================== 1. 選擇使用者介面 ==================== */
        .profile-gate {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #141414;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .profile-title {
            font-size: 2.5rem;
            color: #fff;
            margin-bottom: 40px;
            font-weight: 500;
            letter-spacing: 2px;
            text-align: center;
            padding: 0 20px;
        }

        @media (max-width: 768px) {
            .profile-title { font-size: 1.8rem; margin-bottom: 30px; }
            .profile-list { gap: 25px !important; }
            .avatar-box { width: 110px !important; height: 110px !important; }
            .profile-name { font-size: 1rem !important; }
        }

        .profile-list {
            display: flex;
            gap: 45px;
            list-style: none;
        }

        .profile-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            text-decoration: none;
        }

        .avatar-box {
            position: relative;
            width: 140px;
            height: 140px;
            border-radius: 8px;
            overflow: hidden;
            border: 4px solid transparent;
            transition: border-color 0.2s ease, transform 0.2s ease;
            background-size: cover;
            background-position: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* 山海意境的大頭貼，可自由更換成照片網址 */
        .avatar-her { background-image: url('https://picsum.photos/150/150?girl'); }
        .avatar-him { background-image: url('https://picsum.photos/150/150?boy'); }

        .profile-item:hover .avatar-box {
            border-color: #fff;
            transform: scale(1.06);
        }

        .profile-name {
            margin-top: 15px;
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.6);
            transition: color 0.2s ease;
            letter-spacing: 1px;
        }

        .profile-item:hover .profile-name {
            color: #fff;
        }

        /* ==================== 2. Netflix 經典片頭動畫 ==================== */
        .intro-animation {
            display: none; /* 由 JS 控制開啟 */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 999;
            justify-content: center;
            align-items: center;
            opacity: 1;
            transition: opacity 0.6s ease;
        }

        .netflix-logo-n {
            font-size: 14rem;
            color: #E50914;
            font-weight: 900;
            font-family: 'Impact', 'Arial Black', sans-serif;
            transform: scale(0.5);
            opacity: 0;
            letter-spacing: -5px;
        }

        /* 優化後的經典 N 字強烈放大與立體消散動畫 */
        @keyframes tudumAnimation {
            0% { transform: scale(0.55); opacity: 0; filter: blur(4px); }
            15% { transform: scale(1); opacity: 1; filter: blur(0px); text-shadow: 0 0 30px rgba(229, 9, 20, 0.8), 0 0 50px rgba(229, 9, 20, 0.4); }
            65% { transform: scale(1.05); opacity: 1; filter: blur(0px); text-shadow: 0 0 40px rgba(229, 9, 20, 0.8); }
            100% { transform: scale(3.5); opacity: 0; filter: blur(15px); }
        }

        .animate-n {
            animation: tudumAnimation 3.2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        /* ==================== 3. 主頁面樣式 ==================== */
        .main-content {
            opacity: 0;
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 25px 4%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 100%);
            z-index: 10;
            display: flex;
            align-items: center;
        }

        .logo {
            color: #E50914;
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-decoration: none;
        }

        .banner {
            position: relative;
            height: 100vh;
            background: linear-gradient(to right, rgba(0,0,0,0.88) 45%, rgba(0,0,0,0.3) 100%), 
                        url('https://picsum.photos/1920/1080?romantic') no-repeat center center/cover;
            display: flex;
            align-items: center;
            padding: 0 4%;
        }

        .banner-content {
            max-width: 680px;
            z-index: 2;
            margin-top: 40px;
        }

        .banner-title {
            font-size: 3.5rem;
            font-weight: bold;
            margin-bottom: 18px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.7);
            letter-spacing: 2px;
        }

        @media (max-width: 768px) {
            .banner-title { font-size: 2.2rem; }
            .banner-desc { font-size: 1rem !important; line-height: 1.7 !important; }
        }

        .banner-info {
            margin-bottom: 22px;
            font-size: 1rem;
            color: #cccccc;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .match-score {
            color: #46d369;
            font-weight: bold;
            margin-right: 5px;
        }

        .badge {
            border: 1px solid rgba(255,255,255,0.4);
            padding: 2px 6px;
            font-size: 0.75rem;
            border-radius: 2px;
        }

        .banner-desc {
            font-size: 1.15rem;
            line-height: 1.65;
            margin-bottom: 35px;
            color: #e5e5e5;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.9);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            padding: 12px 28px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 12px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
        }

        .btn-play { background-color: #fff; color: #000; }
        .btn-play:hover { background-color: rgba(255, 255, 255, 0.8); transform: scale(1.03); }
        .btn-info { background-color: rgba(109, 109, 110, 0.7); color: #fff; }
        .btn-info:hover { background-color: rgba(109, 109, 110, 0.4); transform: scale(1.03); }

        /* 影片彈出燈箱 */
        .video-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 100;
            justify-content: center; align-items: center;
        }

        .modal-content {
            position: relative;
            width: 85%; max-width: 950px; aspect-ratio: 16/9;
            background-color: #181818; border-radius: 8px; overflow: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
        }

        .close-btn { position: absolute; top: 15px; right: 20px; color: white; font-size: 35px; cursor: pointer; z-index: 101; transition: color 0.2s;}
        .close-btn:hover { color: #E50914; }
        .video-container { width: 100%; height: 100%; }
        .video-container iframe, .video-container video { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="profile-gate" id="profileGate">
        <h1 class="profile-title">今天，想看哪一段故事？</h1>
        <ul class="profile-list">
            <li class="profile-item" onclick="startOurflixJourney('寶貝')">
                <div class="avatar-box avatar-her"></div>
                <div class="profile-name">執子之手</div>
            </li>
            <li class="profile-item" onclick="startOurflixJourney('男友')">
                <div class="avatar-box avatar-him"></div>
                <div class="profile-name">與子偕老</div>
            </li>
        </ul>
    </div>

    <div class="intro-animation" id="introAnimation">
        <div class="netflix-logo-n" id="netflixN">N</div>
    </div>

    <div class="main-content" id="mainContent">
        <nav class="navbar">
            <a href="#" class="logo">OURFLIX</a>
        </nav>

        <header class="banner">
            <div class="banner-content">
                <h1 class="banner-title">致，不完美的我們</h1>
                
                <div class="banner-info">
                    <span class="match-score">100% 命定珍藏</span>
                    <span>2026</span>
                    <span class="badge">全系列完結篇？</span>
                    <span class="badge" style="color: #ffc107; border-color: #ffc107; font-weight: bold;">精彩未完待續</span>
                </div>
                
                <p class="banner-desc">
                    我知道，我從來就不是一個完美的人。在遇見妳之前，我甚至不太確定自己是不是真的懂得如何去愛一個人、如何體貼、如何給予毫無保留的溫暖。
                    <br><br>
                    謝謝妳，用妳的包容與溫柔，教會了我什麼是愛，也讓我看見了自己的不足。如果可以，妳願意再給未來的我，一次繼續牽著妳寫下新篇章的機會嗎？
                </p>
                
                <div>
                    <button class="btn btn-play" onclick="openModal()">▶ 播放回憶錄</button>
                    <button class="btn btn-info" onclick="showLoveMessage()">ⓘ 關於未來</button>
                </div>
            </div>
        </header>
    </div>

    <div class="video-modal" id="videoModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div class="video-container">
                <iframe id="videoPlayer" src="https://www.youtube.com/embed/dQw4w9WgXcQ?enablejsapi=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>
            </div>
        </div>
    </div>

    <script>
        // 利用強大的 Web Audio API 建立重低音 Tudum 聲，並確保在點擊事件流中立建立
        function emitTudumSound() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const audioCtx = new AudioContext();
                
                // 確保狀態正常
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }

                // 第一個低音音符 (Tu...)
                setTimeout(() => {
                    synthesizeTone(audioCtx, 95, 0.08, 0.45); 
                    synthesizeTone(audioCtx, 135, 0.08, 0.35); 
                }, 0);

                // 第二個震撼重低音 (dum!!!)
                setTimeout(() => {
                    synthesizeTone(audioCtx, 82, 0.12, 0.85); 
                    synthesizeTone(audioCtx, 112, 0.12, 0.65); 
                    synthesizeTone(audioCtx, 52, 0.18, 0.95); // 巨幕電影院重低音感
                }, 140);
            } catch (error) {
                console.log("音訊初始化受限，已改為靜音流暢播放模式。");
            }
        }

        function synthesizeTone(ctx, frequency, attackTime, targetVolume) {
            try {
                const oscillator = ctx.createOscillator();
                const gainNode = ctx.createGain();
                const lowpassFilter = ctx.createBiquadFilter();
                
                oscillator.type = 'sawtooth'; 
                oscillator.frequency.setValueAtTime(frequency, ctx.currentTime);
                
                lowpassFilter.type = 'lowpass';
                lowpassFilter.frequency.setValueAtTime(280, ctx.currentTime);

                gainNode.gain.setValueAtTime(0, ctx.currentTime);
                gainNode.gain.linearRampToValueAtTime(targetVolume, ctx.currentTime + attackTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.3);

                oscillator.connect(lowpassFilter);
                lowpassFilter.connect(gainNode);
                gainNode.connect(ctx.destination);
                
                oscillator.start();
                oscillator.stop(ctx.currentTime + 1.3);
            } catch (e) {}
        }

        // ==================== 核心流程控制：完美解決動畫消失 bug ====================
        function startOurflixJourney(role) {
            const gate = document.getElementById('profileGate');
            const intro = document.getElementById('introAnimation');
            const netflixN = document.getElementById('netflixN');
            const main = document.getElementById('mainContent');

            // 1. 觸發音效（在使用者真實點擊的瞬間喚醒音訊內容，防封鎖成功率最高）
            emitTudumSound();

            // 2. 讓頭像選擇介面淡出
            gate.style.opacity = '0';
            
            setTimeout(() => {
                gate.style.display = 'none';
                
                // 3. 顯示動畫貨櫃
                intro.style.display = 'flex';
                
                /* 【關鍵修復核心】
                   利用讀取 offsetHeight 強迫瀏覽器立刻進行 Layout Reflow，
                   接著用 setTimeout 延遲 30 毫秒注入 Class，確保動畫 100% 被瀏覽器捕獲渲染！
                */
                intro.offsetHeight; 
                
                setTimeout(() => {
                    netflixN.classList.add('animate-n');
                    
                    // 4. 動畫播放完畢後，優雅淡入大橫幅告白主頁
                    setTimeout(() => {
                        intro.style.opacity = '0';
                        setTimeout(() => {
                            intro.style.display = 'none';
                            main.style.opacity = '1';
                            document.body.style.overflow = 'auto'; // 恢復主頁滾動
                        }, 600);
                    }, 3000); // 配合動畫長度
                    
                }, 30);

            }, 600);
        }

        // 影片燈箱控制
        const modal = document.getElementById('videoModal');
        const player = document.getElementById('videoPlayer');

        function openModal() { modal.style.display = 'flex'; }
        function closeModal() {
            modal.style.display = 'none';
            if (player.tagName === 'IFRAME') {
                const currentSrc = player.src;
                player.src = currentSrc; 
            } else if (player.tagName === 'VIDEO') {
                player.pause();
            }
        }

        function showLoveMessage() {
            alert("「對我來說，這部影集的最佳女主角永遠只有妳。不管劇情怎麼發展，我都希望能一直陪妳連載下去。」");
        }

        window.onclick = function(event) { if (event.target == modal) { closeModal(); } }
    </script>
</body>
</html>
